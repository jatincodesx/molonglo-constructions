name: Daily SEO Blog

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:blog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      - name: Commit generated post
        run: |
          if git diff --quiet -- content/blog; then
            echo "No new post generated."
            exit 0
          fi
          git config user.name "molonglo-blog-bot"
          git config user.email "actions@github.com"
          git add content/blog
          git commit -m "Add daily SEO blog post"
          git push
